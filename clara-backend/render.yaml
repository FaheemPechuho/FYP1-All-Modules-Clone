services:
  - type: web
    name: clara-backend
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: VOICE_INPUT_ENABLED
        value: "false"
      - key: SUPPORT_AGENT_ENABLED
        value: "false"
      - key: SALES_AGENT_ENABLED
        value: "true"
      - key: MARKETING_AGENT_ENABLED
        value: "true"
      # ── Secrets: set these in the Render dashboard, NOT here ──────────────
      # GROQ_API_KEY
      # GEMINI_API_KEY
      # SUPABASE_URL
      # SUPABASE_ANON_KEY
      # SUPABASE_SERVICE_KEY
      # RESEND_API_KEY
      # ALLOWED_ORIGINS   (comma-separated, e.g. https://yourapp.vercel.app)
